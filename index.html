<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <style>
        /* 添加一些基本的样式，可以根据需要进行调整 */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        header {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            margin-top: 1rem;
        }

        footer {
            text-align: center;
            padding: 1rem;
            background-color: #333;
            color: #fff;
        }
    </style>
</head>

<body>
    <header>
        <h1>欢迎来到我的个人主页</h1>
    </header>

    <div class="container">
        <h2>关于我</h2>
        <p>你可以在这里简要地介绍你自己，包括你的兴趣、技能和学习经历。</p>

        <h2>我的作品</h2>
        <p>这里可以列举你的一些项目或作品，附上链接或简短描述。</p>

        <h2>联系方式</h2>
        <p>如果你愿意，可以在这里提供你的联系方式，例如电子邮件或社交媒体账号。</p>
    </div>

    <footer>
        <p>版权所有 © 2023 你的名字</p>
    </footer>
</body>

</html>
