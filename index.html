<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <style>
        /* 添加一些基本的样式，可以根据需要进行调整 */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        header {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1rem;
        }

        .profile {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f9f9f9;
            padding: 2rem;
        }

        .profile img {
            max-width: 200px;
            border-radius: 50%;
            margin-right: 1rem;
        }

        .profile-info {
            text-align: left;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            margin-top: 1rem;
        }

        .unit {
            margin-bottom: 1.5rem;
        }

        footer {
            text-align: center;
            padding: 1rem;
            background-color: #333;
            color: #fff;
        }
    </style>
</head>

<body>
    <header>
        <h1>欢迎来到我的个人主页</h1>
    </header>

    <div class="profile">
        <img src="your_photo.jpg" alt="Your Photo">
        <div class="profile-info">
            <h2>你的姓名</h2>
            <p>职业/学校等基本信息</p>
        </div>
    </div>

    <div class="container">
        <div class="unit">
            <h2>爱好</h2>
            <p>这里列出你的爱好，可以使用无序列表：</p>
            <ul>
                <li>爱好1</li>
                <li>爱好2</li>
                <li>爱好3</li>
                <!-- 添加更多爱好 -->
            </ul>
        </div>

        <div class="unit">
            <h2>荣誉</h2>
            <p>这里列出你的荣誉，可以使用有序列表：</p>
            <ol>
                <li>荣誉1</li>
                <li>荣誉2</li>
                <li>荣誉3</li>
                <!-- 添加更多荣誉 -->
            </ol>
        </div>

        <!-- 添加更多单元，比如教育经历、工作经验等 -->

    </div>

    <footer>
        <p>版权所有 © 2023 你的名字</p>
    </footer>
</body>

</html>
